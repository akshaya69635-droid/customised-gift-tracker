services:
  - type: web
    name: paperplane-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paperplane-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: paperplane-db
    plan: free
